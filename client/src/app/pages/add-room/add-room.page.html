<ion-header>
  <ion-toolbar color="dark">
    <ion-buttons slot="start">
      <ion-back-button />
    </ion-buttons>
    <ion-title>Add Room</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formRoot]="roomNameForm" (submit)="addRoom()">
    <ion-list lines="none">
      <ion-item>
        <ion-input
          [formField]="roomNameForm"
          [required]="true"
          label="Enter Room Name"
          labelPlacement="stacked"
          name="roomname"
          type="text"
        />
      </ion-item>
      <ion-item>
        <ion-label>
          <ion-button color="secondary" expand="block" size="default" type="submit">Add</ion-button>
        </ion-label>
      </ion-item>
    </ion-list>
  </form>
</ion-content>
